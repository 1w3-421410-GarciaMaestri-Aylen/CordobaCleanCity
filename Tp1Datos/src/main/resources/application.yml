spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ${APP_NAME:garbage-reporting-service}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/garbage_reporting}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: false
  cache:
    type: redis
    redis:
      time-to-live: ${CACHE_TTL:10m}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}

app:
  messaging:
    report-processing-queue: ${REPORT_PROCESSING_QUEUE:report.processing.queue}
    report-processing-exchange: ${REPORT_PROCESSING_EXCHANGE:report.processing.exchange}
    report-processing-routing-key: ${REPORT_PROCESSING_ROUTING_KEY:report.processing.created}
    report-processing-dlq: ${REPORT_PROCESSING_DLQ:report.processing.dlq}
    report-processing-dlx: ${REPORT_PROCESSING_DLX:report.processing.dlx}
    report-processing-dlq-routing-key: ${REPORT_PROCESSING_DLQ_ROUTING_KEY:report.processing.failed}
  cache:
    reports-today-ttl-minutes: ${REPORTS_TODAY_TTL_MINUTES:10}
    route-optimization-ttl-minutes: ${ROUTE_OPTIMIZATION_TTL_MINUTES:20}
  vision:
    trash-catalog-dir: ${TRASH_CATALOG_DIR:storage/catalog/basura}
    non-trash-catalog-dir: ${NON_TRASH_CATALOG_DIR:storage/catalog/no-basura}
  storage:
    image-dir: ${IMAGE_STORAGE_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
  auth:
    jwt-secret: ${JWT_SECRET:change-this-jwt-secret-for-demo-at-least-32-chars}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
    verification-token-expiration-hours: ${VERIFY_TOKEN_EXP_HOURS:24}
    admin:
      first-name: ${ADMIN_FIRST_NAME:Admin}
      last-name: ${ADMIN_LAST_NAME:Demo}
      email: ${ADMIN_EMAIL:admin@ecoruta.local}
      password: ${ADMIN_PASSWORD:Admin12345!}
  mail:
    mock-enabled: ${MAIL_MOCK_ENABLED:false}
    verification-base-url: ${EMAIL_VERIFY_BASE_URL:http://localhost:5173/verify-email/confirm}
    from: ${MAIL_FROM:no-reply@ecoruta.local}
  routing:
    enabled: ${ROUTING_ENABLED:true}
    provider: ${ROUTING_PROVIDER:osrm}
    osrm-base-url: ${OSRM_BASE_URL:https://router.project-osrm.org}
    profile: ${ROUTING_PROFILE:driving}
